version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: privacy_audit
    ports:
      - "5450:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8181:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: privacy_audit
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-here}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../privacy-audit-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8181
    ports:
      - "3100:80"
    depends_on:
      - backend

volumes:
  pgdata:
